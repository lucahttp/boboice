name: buddy_app
description: Buddy - Voice AI Squire
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  buddy_engine:
    path: ../buddy_engine

  # Audio pipeline
  flutter_onnxruntime: ^1.7.0
  just_audio: ^0.9.40
  path_provider: ^2.1.0

  # Windows audio device enumeration
  win32audio: ^0.0.1
  flutter_recorder: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
